name: Sync Website

on:
  push:
    branches: [main]
    paths:
      - projects/*.yaml
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger showcase sync
        run: |
          curl -sf -X POST "${{ secrets.WEBSITE_URL }}/api/webhooks/showcase" \
            -H "Authorization: Bearer ${{ secrets.SHOWCASE_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"source": "showcase-repo"}'
